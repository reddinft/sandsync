# SandSync API — Fly.io deployment
# Region: syd (Sydney) — co-located with Supabase ap-southeast-2

app = "sandsync-api"
primary_region = "syd"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8080"
NODE_ENV = "production"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
